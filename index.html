<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财富日报 - 每日热门财经新闻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">📈</span>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">财富思维 | <span class="text-blue-600">财经日报</span></h1>
            </div>
            <div id="current-date" class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">加载中...</div>
        </div>
    </header>

    <main class="flex-grow max-w-5xl w-full mx-auto px-4 py-8">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-6 md:p-8 text-white shadow-lg mb-8">
            <h2 class="text-2xl md:text-3xl font-bold mb-2">掌握市场脉搏，智启每日财富</h2>
            <p class="text-blue-100 text-sm md:text-base max-w-2xl">数据源自公开财经快讯，自动化后台每小时更新，全球 CDN 加速送达。</p>
        </div>

        <div id="loading-status" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-4"></div>
            <p class="text-slate-500">正在为您搜集今日热门财经资讯...</p>
        </div>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden"></div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 mt-12">
        <div class="max-w-5xl mx-auto px-4 text-center text-xs text-slate-400">
            <p>© 2026 财富日报资讯聚合系统. 自动化全天候更新.</p>
        </div>
    </footer>

    <script>
        function displayDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('zh-CN', options);
        }

        async function fetchFinanceNews() {
            const container = document.getElementById('news-container');
            const statusEl = document.getElementById('loading-status');
            
            try {
                // ⚡ 核心优化：直接读取本地部署的静态 json，速度提升 10 倍以上
                const response = await fetch('./news.json?t=' + new Date().getTime()); 
                if (!response.ok) throw new Error('未能加载今日新闻');
                
                const data = await response.json();
                
                statusEl.classList.add('hidden');
                container.classList.remove('hidden');
                container.innerHTML = '';
                
                data.forEach((item, index) => {
                    const cardHtml = `
                        <a href="${item.link}" target="_blank" class="block bg-white rounded-xl p-5 border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-400 transition-all duration-200 group">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-xs font-semibold px-2 py-0.5 rounded ${index < 3 ? 'bg-red-50 text-red-600' : 'bg-slate-100 text-slate-600'}">
                                    ${index < 3 ? '🔥 热门要闻' : '📍 财经快讯'}
                                </span>
                                <span class="text-xs text-slate-400 font-mono">${item.time}</span>
                            </div>
                            <h3 class="text-base font-bold text-slate-900 group-hover:text-blue-600 transition-colors duration-150 mb-2 line-clamp-2">${item.title}</h3>
                            <p class="text-sm text-slate-500 line-clamp-2 leading-relaxed">${item.description}</p>
                            <div class="mt-4 flex items-center text-xs font-medium text-blue-600 group-hover:text-blue-700">
                                阅读原文 
                                <svg class="w-3 h-3 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </div>
                        </a>
                    `;
                    container.innerHTML += cardHtml;
                });
            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<p class="text-red-500 font-medium">⚠️ 暂时无法获取最新资讯，请稍后重试。</p>`;
            }
        }

        displayDate();
        fetchFinanceNews();
    </script>
</body>
</html>
