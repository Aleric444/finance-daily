name: 每日财经新闻自动更新

on:
  schedule:
    # 国际标准时间，相当于北京时间每小时的 0 分执行一次（可根据需要修改）
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动点击按钮触发更新

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 检查分支代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-python: '3.10'

    - name: 执行抓取脚本
      run: python fetch_news.py

    - name: 将更新的 news.json 提交回仓库
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add news.json
        git commit -m "自动更新财经新闻: $(date)" || echo "没有新内容"
        git push
